---
- name: Ensure dependencies are installed
  ansible.builtin.package:
    name: [ca-certificates, curl]
    state: present

- name: Download otelcol-contrib package
  ansible.builtin.get_url:
    url: "https://github.com/open-telemetry/opentelemetry-collector-releases/releases/download/v{{ otel_version }}/otelcol-contrib_{{ otel_version }}_linux_amd64.rpm"
    dest: "/tmp/otelcol-contrib.rpm"
    mode: '0644'

- name: Install otelcol-contrib
  ansible.builtin.dnf:
    name: "/tmp/otelcol-contrib.rpm"
    state: present
    disable_gpg_check: true
  notify: Restart otelcol-contrib

- name: Add otelcol-contrib user to required groups
  ansible.builtin.user:
    name: otelcol-contrib
    groups: [adm, systemd-journal]
    append: true
