---
- name: Download Ollama install script
  ansible.builtin.get_url:
    url: https://ollama.com/install.sh
    dest: /tmp/ollama-install.sh
    mode: '0755'

- name: Run Ollama install script
  ansible.builtin.shell: /tmp/ollama-install.sh
  args:
    creates: "{{ ollama_install_dir }}/ollama"

- name: Clean up install script
  ansible.builtin.file:
    path: /tmp/ollama-install.sh
    state: absent

- name: Create systemd override directory
  ansible.builtin.file:
    path: "{{ ollama_service_override_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy systemd override
  ansible.builtin.template:
    src: ollama-override.conf.j2
    dest: "{{ ollama_service_override_dir }}/override.conf"
    owner: root
    group: root
    mode: '0644'
  notify: restart ollama