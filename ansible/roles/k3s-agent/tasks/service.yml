- name: Wait for cluster token on master
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60
  delegate_to: "{{ groups['master'][0] }}"

- name: Read cluster token from master
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw
  delegate_to: "{{ groups['master'][0] }}"

- name: Set cluster token fact
  ansible.builtin.set_fact:
    k3s_cluster_token: "{{ k3s_token_raw.content | b64decode | trim }}"

- name: Install k3s-agent systemd service
  template:
    src: k3s-agent.service.j2
    dest: /etc/systemd/system/k3s-agent.service
    mode: "0644"
  notify: Restart k3s-agent

- name: Enable and start k3s-agent
  systemd:
    name: k3s-agent
    enabled: true
    state: started
    daemon_reload: true
