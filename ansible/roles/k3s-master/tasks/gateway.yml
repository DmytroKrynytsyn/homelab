- name: Register Envoy Gateway OCI repo with ArgoCD
  template:
    src: envoy-gateway-repo.yaml.j2
    dest: /tmp/envoy-gateway-repo.yaml

- name: Apply Envoy Gateway repo secret
  shell: /usr/local/bin/k3s kubectl apply -f /tmp/envoy-gateway-repo.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Deploy Envoy Gateway ArgoCD Application
  template:
    src: envoy-gateway-app.yaml.j2
    dest: /tmp/envoy-gateway-app.yaml

- name: Apply Envoy Gateway ArgoCD Application
  shell: /usr/local/bin/k3s kubectl apply -f /tmp/envoy-gateway-app.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml