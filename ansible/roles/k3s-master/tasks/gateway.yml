- name: Apply Gateway API CRDs
  shell: >
    /usr/local/bin/k3s kubectl apply -f
    https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for Gateway API CRDs to be established
  shell: >
    /usr/local/bin/k3s kubectl wait --for=condition=Established
    crd/gateways.gateway.networking.k8s.io
    crd/httproutes.gateway.networking.k8s.io
    crd/referencegrants.gateway.networking.k8s.io
    --timeout=60s
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Deploy Envoy Gateway ArgoCD Application
  template:
    src: envoy-gateway-app.yaml.j2
    dest: /tmp/envoy-gateway-app.yaml

- name: Apply Envoy Gateway ArgoCD Application
  shell: /usr/local/bin/k3s kubectl apply -f /tmp/envoy-gateway-app.yaml
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for Envoy Gateway to be ready
  shell: >
    /usr/local/bin/k3s kubectl wait --timeout=5m
    -n envoy-gateway-system
    deployment/envoy-gateway
    --for=condition=Available
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml