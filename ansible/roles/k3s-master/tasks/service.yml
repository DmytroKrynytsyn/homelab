- name: Install k3s systemd service
  template:
    src: k3s.service.j2
    dest: /etc/systemd/system/k3s.service
    mode: "0644"
  notify: Restart k3s

- name: Enable and start k3s
  systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for node token
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60
