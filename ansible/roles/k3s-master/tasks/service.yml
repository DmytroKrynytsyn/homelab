- name: Allow k3s API server (port 6443) through UFW
  ufw:
    rule: allow
    port: 6443
    proto: tcp

- name: Install k3s systemd service
  template:
    src: k3s.service.j2
    dest: /etc/systemd/system/k3s.service
    mode: "0644"
  notify: Restart k3s

- name: Enable and start k3s
  systemd:
    name: k3s
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for node token
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60

- name: Read cluster token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw

- name: Set token fact
  set_fact:
    k3s_cluster_token: "{{ k3s_token_raw.content | b64decode | trim }}"
