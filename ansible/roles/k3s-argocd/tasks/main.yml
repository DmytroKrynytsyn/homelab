- name: Create gitops/argocd directory
  file:
    path: /root/gitops/argocd
    state: directory
    mode: '0755'

- name: Wait for kubeconfig to be ready
  wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 60

- name: Download Argo CD manifest
  get_url:
    url: https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml
    dest: /root/gitops/argocd/install.yaml

- name: Create kustomization.yaml
  template:
    src: kustomization.yaml.j2
    dest: /root/gitops/argocd/kustomization.yaml

- name: Create argocd namespace
  shell: kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
  ignore_errors: true

- name: Apply Argo CD with kustomize
  shell: kubectl apply -k /root/gitops/argocd

- name: Wait for argocd-cmd-params-cm ConfigMap to exist
  shell: kubectl get configmap argocd-cmd-params-cm -n argocd
  retries: 10
  delay: 3
  register: result
  until: result.rc == 0

- name: Patch argocd-cmd-params-cm to enable insecure mode
  shell: kubectl patch configmap argocd-cmd-params-cm -n argocd -p '{"data":{"server.insecure":"true"}}'
  ignore_errors: true

- name: Wait for ArgoCD admin secret to be created
  shell: kubectl get secret argocd-initial-admin-secret -n argocd
  retries: 30
  delay: 2
  register: secret_result
  until: secret_result.rc == 0

- name: Set real ArgoCD admin password in argocd-secret
  shell: kubectl -n argocd patch secret argocd-secret -p '{"stringData":{"admin.password":"{{ argocd_admin_password_hash }}","admin.passwordMtime":"{{ ansible_facts.date_time.iso8601 }}"}}'

- name: Set ArgoCD admin password in argocd-initial-admin-secret
  shell: kubectl -n argocd patch secret argocd-initial-admin-secret -p '{"stringData":{"password":"{{ argocd_admin_password }}"}}'

- name: Display ArgoCD admin credentials
  debug:
    msg: |
      ArgoCD Admin Credentials:
      ========================
      Username: admin
      Password: {{ argocd_admin_password }}
