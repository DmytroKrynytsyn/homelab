- name: Apply Gateway API CRDs
  shell: >
    kubectl apply -f
    https://github.com/kubernetes-sigs/gateway-api/releases/download/{{ gateway_api_version }}/standard-install.yaml

- name: Wait for Gateway API CRDs to be established
  shell: >
    kubectl wait --for=condition=Established
    crd/gateways.gateway.networking.k8s.io
    crd/httproutes.gateway.networking.k8s.io
    crd/referencegrants.gateway.networking.k8s.io
    --timeout=60s

- name: Deploy Envoy Gateway ArgoCD Application
  template:
    src: envoy-gateway-app.yaml.j2
    dest: /tmp/envoy-gateway-app.yaml

- name: Apply Envoy Gateway ArgoCD Application
  shell: kubectl apply -f /tmp/envoy-gateway-app.yaml

- name: Wait for envoy-gateway-system namespace to be created by ArgoCD
  shell: kubectl get namespace envoy-gateway-system
  retries: 20
  delay: 15
  register: ns_result
  until: ns_result.rc == 0

- name: Wait for Envoy Gateway deployment to be available
  shell: >
    kubectl wait --timeout=5m
    -n envoy-gateway-system
    deployment/envoy-gateway
    --for=condition=Available
  register: deploy_result
  retries: 10
  delay: 10
  until: deploy_result.rc == 0

- name: Apply EnvoyProxy
  template:
    src: envoy-proxy.yaml.j2
    dest: /tmp/envoy-proxy.yaml

- name: Apply EnvoyProxy to cluster
  shell: kubectl apply -f /tmp/envoy-proxy.yaml

- name: Apply GatewayClass
  template:
    src: gateway-class.yaml.j2
    dest: /tmp/gateway-class.yaml

- name: Apply GatewayClass to cluster
  shell: kubectl apply -f /tmp/gateway-class.yaml

- name: Wait for GatewayClass to be accepted
  shell: >
    kubectl wait --timeout=30s
    gatewayclass/eg
    --for=condition=Accepted

- name: Apply Gateway
  template:
    src: gateway.yaml.j2
    dest: /tmp/gateway.yaml

- name: Apply Gateway to cluster
  shell: kubectl apply -f /tmp/gateway.yaml

- name: Wait for Gateway to be programmed
  shell: >
    kubectl wait --timeout=60s
    -n envoy-gateway-system
    gateway/homelab-gateway
    --for=condition=Programmed

- name: Apply ReferenceGrants
  template:
    src: reference-grant.yaml.j2
    dest: /tmp/reference-grant.yaml

- name: Apply ReferenceGrants to cluster
  shell: kubectl apply -f /tmp/reference-grant.yaml

- name: Create ArgoCD ingress
  template:
    src: argocd-ingress.yaml.j2
    dest: /tmp/argocd-ingress.yaml

- name: Apply ArgoCD ingress
  shell: kubectl apply -f /tmp/argocd-ingress.yaml

- name: Display ArgoCD URL
  debug:
    msg: "Access ArgoCD at: http://argocd.{{ argocd_domain }}"
