---
- name: Deploy ollama build systemd service
  ansible.builtin.template:
    src: node-ollama-build.service.j2
    dest: /etc/systemd/system/node-ollama-build.service
    owner: root
    group: root
    mode: '0644'
  notify: restart node-ollama-build timer

- name: Deploy ollama build systemd timer
  ansible.builtin.template:
    src: node-ollama-build.timer.j2
    dest: /etc/systemd/system/node-ollama-build.timer
    owner: root
    group: root
    mode: '0644'
  notify: restart node-ollama-build timer

- name: Enable and start node-ollama-build timer
  ansible.builtin.systemd:
    name: node-ollama-build.timer
    enabled: true
    state: started
    daemon_reload: true
