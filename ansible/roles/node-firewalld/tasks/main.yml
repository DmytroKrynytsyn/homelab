- name: Ensure firewalld is enabled and running
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Allow SSH (all nodes)
  ansible.posix.firewalld:
    port: "{{ firewalld_ssh_port }}"
    permanent: true
    immediate: true
    state: enabled

- name: Allow k3s API server (master only)
  ansible.posix.firewalld:
    port: "{{ firewalld_k3s_api_port }}"
    permanent: true
    immediate: true
    state: enabled
  when: "'master' in group_names"

- name: Allow kubelet port
  ansible.posix.firewalld:
    port: "{{ firewalld_kubelet_port }}"
    permanent: true
    immediate: true
    state: enabled

- name: Allow flannel VXLAN
  ansible.posix.firewalld:
    port: "{{ firewalld_flannel_vxlan_port }}"
    permanent: true
    immediate: true
    state: enabled

# Forwarded pod-to-pod/Service traffic (decapsulated flannel VXLAN) is dropped by
# firewalld's default zone unless its source is trusted. Trusting the pod/service
# CIDRs (rather than the cni0/flannel.1 interfaces) works before k3s/flannel even
# exist, since the CIDRs are static k3s defaults.
- name: Trust pod CIDR for pod-to-pod/Service traffic
  ansible.posix.firewalld:
    zone: trusted
    source: "{{ firewalld_pod_cidr }}"
    permanent: true
    immediate: true
    state: enabled

- name: Trust service CIDR for ClusterIP traffic
  ansible.posix.firewalld:
    zone: trusted
    source: "{{ firewalld_service_cidr }}"
    permanent: true
    immediate: true
    state: enabled
