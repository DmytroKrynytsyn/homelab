- name: Ensure firewalld is enabled and running
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Allow SSH (all nodes)
  ansible.posix.firewalld:
    port: "{{ firewalld_ssh_port }}"
    permanent: true
    immediate: true
    state: enabled

- name: Allow k3s API server (master only)
  ansible.posix.firewalld:
    port: "{{ firewalld_k3s_api_port }}"
    permanent: true
    immediate: true
    state: enabled
  when: "'master' in group_names"

- name: Allow kubelet port
  ansible.posix.firewalld:
    port: "{{ firewalld_kubelet_port }}"
    permanent: true
    immediate: true
    state: enabled

- name: Allow flannel VXLAN
  ansible.posix.firewalld:
    port: "{{ firewalld_flannel_vxlan_port }}"
    permanent: true
    immediate: true
    state: enabled
